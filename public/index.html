<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Skincare</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
    .mask { width: 100%; height: 250px; object-fit: contain; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- Navbar -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-pink-600 tracking-tight">GlowSkin</h1>
      <div class="flex-1 px-8">
        <div class="relative max-w-lg mx-auto">
          <input type="text" id="searchInput" placeholder="Search for skin products..." class="w-full pl-10 pr-4 py-2 bg-gray-100 border-none rounded-full focus:ring-2 focus:ring-pink-300 outline-none transition-all">
          <i class="fas fa-search absolute left-4 top-3 text-gray-400"></i>
        </div>
      </div>
      <div class="flex items-center space-x-6">
        <div class="text-sm font-medium"><i class="fas fa-user mr-2 text-gray-500"></i>Sign In</div>
        <div class="relative cursor-pointer" id="cartBtn">
          <i class="fas fa-shopping-bag text-xl text-gray-600"></i>
          <span id="cartCount" class="absolute -top-1 -right-2 bg-pink-500 text-white text-xs font-bold px-1.5 py-0.5 rounded-full">0</span>
        </div>
      </div>
    </div>
    <!-- Categories Nav -->
    <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 border-t flex space-x-8 text-sm font-medium text-gray-600 overflow-x-auto">
      <a href="#" class="hover:text-pink-600">What's New</a>
      <a href="#" class="hover:text-pink-600 text-pink-600">Skin</a>
      <a href="#" class="hover:text-pink-600">Makeup</a>
      <a href="#" class="hover:text-pink-600">Hair</a>
      <a href="#" class="hover:text-pink-600">Body Care</a>
      <a href="#" class="hover:text-pink-600">Best Sellers</a>
    </nav>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex gap-8">
    
    <!-- Sidebar Filters -->
    <aside class="w-64 flex-shrink-0">
      <h2 class="text-xl font-bold mb-6">Filters</h2>

      <!-- Rating Filter -->
      <div class="mb-8">
        <h3 class="font-semibold mb-3 flex justify-between items-center">Rating <i class="fas fa-chevron-up text-xs"></i></h3>
        <div class="space-y-2 text-sm" id="ratingFilters">
          <label class="flex items-center space-x-2 cursor-pointer">
            <input type="radio" name="rating" value="4" class="text-pink-600 focus:ring-pink-500">
            <span class="flex items-center text-yellow-400">
              <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="far fa-star"></i>
            </span>
            <span class="text-gray-600">4 & up</span>
          </label>
          <label class="flex items-center space-x-2 cursor-pointer">
            <input type="radio" name="rating" value="3" class="text-pink-600 focus:ring-pink-500">
            <span class="flex items-center text-yellow-400">
              <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="far fa-star"></i><i class="far fa-star"></i>
            </span>
            <span class="text-gray-600">3 & up</span>
          </label>
          <label class="flex items-center space-x-2 cursor-pointer">
            <input type="radio" name="rating" value="" class="text-pink-600 focus:ring-pink-500" checked>
            <span class="text-gray-600">All Ratings</span>
          </label>
        </div>
      </div>

      <!-- Brand Filter -->
      <div>
        <h3 class="font-semibold mb-3 flex justify-between items-center">Brand <i class="fas fa-chevron-up text-xs"></i></h3>
        <input type="text" placeholder="Search brand..." class="w-full text-sm border-gray-300 rounded-md shadow-sm focus:ring-pink-500 focus:border-pink-500 mb-3 px-3 py-2 border">
        <div class="space-y-2 text-sm max-h-60 overflow-y-auto" id="brandFilters">
          <!-- Dynamically populated via API -->
          <div class="text-gray-400 italic">Loading brands...</div>
        </div>
      </div>
    </aside>

    <!-- Product Grid -->
    <div class="flex-1">
      <div class="flex justify-between items-center mb-6">
        <p class="text-gray-500 text-sm" id="resultCount">0 results</p>
        <div class="flex items-center space-x-2 text-sm">
          <span class="text-gray-600">Sort By:</span>
          <select id="sortSelect" class="border-gray-300 rounded-md font-medium focus:ring-pink-500 focus:border-pink-500 outline-none p-1 bg-transparent">
            <option value="relevance">Relevance</option>
            <option value="price_low_high">Price: Low to High</option>
            <option value="price_high_low">Price: High to Low</option>
          </select>
        </div>
      </div>

      <!-- Grid -->
      <div id="productsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Products will be injected here -->
        <p class="text-gray-500">Loading products...</p>
      </div>

      <!-- Pagination -->
      <div id="pagination" class="mt-8 flex justify-center space-x-2"></div>
    </div>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
